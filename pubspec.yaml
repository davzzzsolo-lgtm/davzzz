name: xxo25
description: "Bug WhatsApp Crasher"
publish_to: 'none'
version: 2.0.0

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  http: ^0.13.6
  intl: ^0.18.1
  cached_network_image: ^3.3.0
  youtube_player_flutter: ^9.1.1
  url_launcher: ^6.2.6
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.2.2
  device_info_plus: ^10.1.0
  carousel_slider: 4.0.0
  web_socket_channel: ^2.4.0
  network_info_plus: ^4.1.0
  shimmer: ^3.0.0
  webview_flutter: ^4.4.2
  permission_handler: ^11.0.0
  video_player: ^2.9.2
  font_awesome_flutter: ^10.7.0
  path_provider: ^2.1.1
  share_plus: ^7.0.1
  chewie: ^1.8.5
  audioplayers: ^6.1.0
  image_picker: ^1.1.2
  
  # ===================================================

dev_dependencies:
  flutter_launcher_icons: ^0.13.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path_android: "assets/icon/icon.jpg"
  image_path_ios: "assets/icon/icon/icon.jpg"
  image_path: "assets/icon/icon.jpg"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/icon.jpg
    - assets/images/icon.png
    - assets/images/logo.jpg
    - assets/images/logo.png
    - assets/videos/splash.mp4
    - assets/videos/background.mp4
    - assets/videos/load.mp4
    - assets/videos/login.mp4
    - assets/videos/animek.mp4
    - assets/videos/banner.mp4
    - assets/images/news1.jpg
    - assets/images/news2.jpg
    - assets/images/news3.jpg
    - assets/images/news4.jpg
    - assets/images/news5.jpg
    
  fonts:
    - family: Orbitron
      fonts:
        - asset: fonts/x.ttf
    - family: ShareTechMono
      fonts:
        - asset: fonts/ShareTechMono-Regular.ttf